name = "iotpro" # Project name changed to 'iotpro'
main = "src/index.js"
compatibility_date = "2024-01-01"
‚ÄčWe need modules enabled to use the clean import/export syntax
‚Äčin our source files (e.g., import AUTH_HTML from './auth.html';)
‚Äčcompatibility_flags = ["nodejs_compat", "html_rewriter"]
‚Äč--- KV Namespace Bindings ---
‚ÄčThis binds the KV Namespace "USERS" to the 'USERS' variable in your Worker's env object.
‚ÄčYou must create this namespace first via the Cloudflare dashboard or CLI.
‚Äč[[kv_namespaces]]
binding = "USERS"
id = "YOUR_USERS_KV_ID" # IMPORTANT: Replace this placeholder with the actual ID after creation
preview_id = "YOUR_USERS_KV_ID_PREVIEW" # IMPORTANT: Replace this placeholder for local development
‚Äč--- Secrets and Variables ---
‚ÄčThe JWT_SECRET must be set as a secret in your Worker's environment variables.
‚Äč(e.g., using wrangler secret put JWT_SECRET)
‚ÄčIt will be accessible via env.JWT_SECRET
‚ÄčBindings = [JWT_SECRET, USERS]
